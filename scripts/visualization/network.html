<!DOCTYPE html>
<html>
<head>
    <title>Concept Map Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }
        .depth-button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: Arial, sans-serif;
            font-size: 14px;
            transition: all 0.2s;
        }
        .depth-button.active {
            transform: scale(0.95);
        }
        #summary {
            background: #2B6CB0;
            color: white;
        }
        #moderate {
            background: #63B3ED;
            color: white;
        }
        #detailed {
            background: #CBD5E0;
            color: #2D3748;
        }
        #visualization {
            width: 100%;
            height: 100vh;
            background: #f8fafc;
        }
        .node text {
            fill: black;
            text-anchor: middle;
            font-family: Arial, sans-serif;
            pointer-events: none;
        }
    </style>
</head>
<body style="margin: 0; padding: 0;">
    <div class="controls">
        <button id="summary" class="depth-button active">Summary</button>
        <button id="moderate" class="depth-button">Core+Extended</button>
        <button id="detailed" class="depth-button">Detailed</button>
    </div>
    <div id="visualization"></div>
    <script src="network.js"></script>
</body>
</html>
